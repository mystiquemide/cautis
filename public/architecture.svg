<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#1A1A2E;font-family:Inter,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16213E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="casperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F3460"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#E2E8F0" font-size="20" font-weight="bold">Cautis — System Architecture</text>

  <!-- Frontend Box -->
  <rect x="50" y="55" width="700" height="100" rx="8" fill="#16213E" stroke="#334155" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" fill="#94A3B8" font-size="12">FRONTEND (Claude Code)</text>
  <rect x="80" y="95" width="140" height="40" rx="6" fill="#1A1A2E" stroke="#00D4AA" stroke-width="1"/>
  <text x="150" y="119" text-anchor="middle" fill="#E2E8F0" font-size="11">Landing Page</text>
  <rect x="240" y="95" width="140" height="40" rx="6" fill="#1A1A2E" stroke="#00D4AA" stroke-width="1"/>
  <text x="310" y="119" text-anchor="middle" fill="#E2E8F0" font-size="11">Dashboard</text>
  <rect x="400" y="95" width="140" height="40" rx="6" fill="#1A1A2E" stroke="#00D4AA" stroke-width="1"/>
  <text x="470" y="119" text-anchor="middle" fill="#E2E8F0" font-size="11">Agent Detail</text>
  <rect x="560" y="95" width="140" height="40" rx="6" fill="#1A1A2E" stroke="#00D4AA" stroke-width="1"/>
  <text x="630" y="119" text-anchor="middle" fill="#E2E8F0" font-size="11">Alert Center</text>

  <!-- Arrow Frontend → API -->
  <line x1="400" y1="155" x2="400" y2="185" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="175" fill="#94A3B8" font-size="9">REST API</text>

  <!-- Backend API Box -->
  <rect x="50" y="190" width="700" height="130" rx="8" fill="#16213E" stroke="#334155" stroke-width="1"/>
  <text x="400" y="215" text-anchor="middle" fill="#94A3B8" font-size="12">BACKEND API (Next.js Routes)</text>

  <rect x="80" y="230" width="130" height="35" rx="5" fill="#1A1A2E" stroke="#334155" stroke-width="1"/>
  <text x="145" y="252" text-anchor="middle" fill="#E2E8F0" font-size="10">/api/agents</text>
  <rect x="225" y="230" width="130" height="35" rx="5" fill="#1A1A2E" stroke="#334155" stroke-width="1"/>
  <text x="290" y="252" text-anchor="middle" fill="#E2E8F0" font-size="10">/api/monitor</text>
  <rect x="370" y="230" width="130" height="35" rx="5" fill="#1A1A2E" stroke="#334155" stroke-width="1"/>
  <text x="435" y="252" text-anchor="middle" fill="#E2E8F0" font-size="10">/api/alerts</text>
  <rect x="515" y="230" width="130" height="35" rx="5" fill="#1A1A2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="580" y="252" text-anchor="middle" fill="#F59E0B" font-size="10">/api/pay (x402)</text>

  <!-- Guardian Logic -->
  <rect x="200" y="280" width="400" height="30" rx="5" fill="#0F3460" stroke="#00D4AA" stroke-width="1"/>
  <text x="400" y="300" text-anchor="middle" fill="#00D4AA" font-size="11">Guardian Logic — Claude API / QuickCheck</text>

  <!-- Arrow API → Casper -->
  <line x1="400" y1="320" x2="400" y2="355" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="342" fill="#94A3B8" font-size="9">HTTPS / CSPR.cloud</text>

  <!-- Casper Testnet Box -->
  <rect x="50" y="360" width="700" height="145" rx="8" fill="#0F3460" stroke="#00D4AA" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" fill="#00D4AA" font-size="13" font-weight="bold">CASPER TESTNET</text>

  <rect x="80" y="400" width="200" height="85" rx="6" fill="#16213E" stroke="#334155" stroke-width="1"/>
  <text x="180" y="420" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="bold">Guardian Contract</text>
  <text x="180" y="438" text-anchor="middle" fill="#94A3B8" font-size="9">Odra / Rust</text>
  <text x="180" y="453" text-anchor="middle" fill="#94A3B8" font-size="9">register_agent</text>
  <text x="180" y="468" text-anchor="middle" fill="#94A3B8" font-size="9">stake_cspr · freeze_agent</text>

  <rect x="300" y="400" width="200" height="85" rx="6" fill="#16213E" stroke="#F59E0B" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="bold">x402 Facilitator</text>
  <text x="400" y="438" text-anchor="middle" fill="#94A3B8" font-size="9">HTTP 402 Payments</text>
  <text x="400" y="453" text-anchor="middle" fill="#94A3B8" font-size="9">/verify · /settle</text>
  <text x="400" y="468" text-anchor="middle" fill="#94A3B8" font-size="9">casper:casper-test</text>

  <rect x="520" y="400" width="200" height="85" rx="6" fill="#16213E" stroke="#334155" stroke-width="1"/>
  <text x="620" y="420" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="bold">CSPR.cloud API</text>
  <text x="620" y="438" text-anchor="middle" fill="#94A3B8" font-size="9">REST + Streaming</text>
  <text x="620" y="453" text-anchor="middle" fill="#94A3B8" font-size="9">balance · transfers</text>
  <text x="620" y="468" text-anchor="middle" fill="#94A3B8" font-size="9">deploy status</text>

  <!-- Footer -->
  <text x="400" y="585" text-anchor="middle" fill="#475569" font-size="9">Cautis — Casper Agentic Buildathon 2026</text>
</svg>
